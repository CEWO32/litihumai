<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Lithium AI | Ultra Fast</title>
    <style>
        body { background: #0d0d0d; color: #00d4ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 500px; background: #1a1a1a; padding: 25px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #output { height: 300px; overflow-y: auto; background: #000; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #444; font-size: 15px; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #252525; color: #fff; outline: none; box-sizing: border-box; }
        .user { color: #fff; margin-bottom: 5px; }
        .ai { color: #00ff88; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-top:0;">LITHIUM AI</h2>
    <div id="output">Hazýr. @Artimichi için çalýţýyor...</div>
    <input type="text" id="userInput" placeholder="Mesajýný yaz ve Enter'a bas..." autofocus>
</div>

<script>
    const API_KEY = "AIzaSyDpY1pNarcm2r8lpOwGAaaf087y5_256II";
    const input = document.getElementById('userInput');
    const output = document.getElementById('output');

    async function askAI() {
        const text = input.value.trim();
        if(!text) return;

        output.innerHTML += `<div class="user"><b>Sen:</b> ${text}</div>`;
        input.value = "";

        // --- HIZLI MATEMATÝK KONTROLÜ (BEKLEME YAPMAZ) ---
        try {
            if (/^[0-9+\-*/(). ]+$/.test(text)) {
                const mathResult = eval(text);
                output.innerHTML += `<div class="ai"><b>Lithium:</b> ${text} = ${mathResult}</div>`;
                output.scrollTop = output.scrollHeight;
                return; // Ýnternete gitmeden burada bitirir
            }
        } catch(e) {}

        // --- DÝĐER SORULAR ÝÇÝN ÝNTERNETE BAĐLANIR ---
        const loading = document.createElement('div');
        loading.className = "ai";
        loading.innerHTML = "<b>Lithium:</b> Bađlanýlýyor...";
        output.appendChild(loading);
        output.scrollTop = output.scrollHeight;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await res.json();
            output.removeChild(loading);

            const aiRes = data.candidates[0].content.parts[0].text;
            output.innerHTML += `<div class="ai"><b>Lithium:</b> ${aiRes}</div>`;
        } catch (err) {
            loading.innerHTML = "<b>Lithium:</b> Bađlantý baţarýsýz oldu!";
        }
        output.scrollTop = output.scrollHeight;
    }

    input.addEventListener("keypress", (e) => { if (e.key === "Enter") askAI(); });
</script>

</body>
</html>
